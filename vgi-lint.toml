# vgi-lint-check configuration for the vgi-bgp worker.
#
# The catalog `source_url` (→ the GitHub repo), the classifying schema tags
# (domain / category / topic), titles, doc_llm / doc_md, keywords, per-argument
# docs, example_queries, and the executable_examples payload are all emitted from
# the worker's catalog + FunctionMetadata (crates/bgp-worker/src/**), which the
# linter reads over VGI. All of those STATIC metadata rules gate at `info`.
#
# Every example is self-contained, so the example-EXECUTION rules
# (VGI901/902/906/907) are ENABLED and run against the attached worker: the
# read_rib / read_updates / peers examples scan an inline MRT BLOB via
# `from_hex(...)` (no `data/*.mrt` file needed) and none of the executed examples
# use the core `INET` type (which would need `LOAD inet;` — that path is exercised
# instead by the haybarn SQLLogic E2E in test/sql/*.test, which loads `vgi` +
# `inet`). The whole suite — static metadata and executed examples alike — gates
# at --fail-on info.
[tool.vgi-lint-check]
select = ["ALL"]
ignore = []
fail_on = "info"

[tool.vgi-lint-check.options]
column_comment_min_ratio = 0.8
