name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Allow release.yml to run this exact suite as a gating `uses:` job before it
  # publishes anything.
  workflow_call:

concurrency:
  # Include github.workflow so a direct CI run and the `uses:`-embedded CI job of
  # release.yml land in DISTINCT groups (in a reusable workflow github.workflow
  # resolves to the CALLER), so the tag-triggered release caller does not cancel
  # an in-flight CI run.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: fmt · clippy · unit + proptest + doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Debug-profile cache (clippy + test); only write from main so PR branches
      # don't evict main's cache via the 10 GB LRU cap.
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests + property-based fuzzing
        run: cargo test --workspace --all-features

      - name: Docs (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  e2e:
    name: SQLLogic e2e (haybarn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Share one release-profile cache with metadata-quality (both build the
      # worker in release mode), so the dependency graph compiles once.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install the haybarn unittest runner
        run: |
          uv tool install haybarn-unittest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install the vgi + inet extensions
        # inet supplies DuckDB's INET type, which the read_rib/read_updates/peers
        # tests cast prefixes and peer IPs to.
        run: |
          echo "INSTALL vgi FROM community;" | uvx haybarn-cli
          echo "INSTALL inet;" | uvx haybarn-cli

      - name: Run SQLLogic suite against the built worker
        run: ./run_tests.sh

  metadata-quality:
    name: metadata quality (vgi-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build worker (release)
        run: cargo build --release --bin bgp-worker

      - name: vgi-lint
        uses: Query-farm/vgi-lint-check@v1
        with:
          version: "0.37.0"
          location: "${{ github.workspace }}/target/release/bgp-worker"
          fail-on: info

  audit:
    name: supply-chain audit (cargo-audit)
    runs-on: ubuntu-latest
    # rustsec/audit-check posts its results as a check-run; that needs
    # `checks: write`. Without an explicit block the token is read-only and the
    # action dies with "Resource not accessible by integration … create-a-check-run".
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Comma/newline-separated advisory ids to ignore (all transitive, none
          # reachable/exploitable here); real vulns in our own deps still fail.
          #
          # RUSTSEC-2025-0141: `bincode 1.3.3` flagged *unmaintained* (not
          #   vulnerable — 1.3.3 was declared complete). Transitive, not pulled
          #   directly.
          # RUSTSEC-2026-0194 / RUSTSEC-2026-0195: quick-xml < 0.41.0 DoS
          #   (quadratic attribute check / unbounded namespace alloc). Reached
          #   only transitively via object_store's `aws` feature to parse S3 API
          #   responses from the configured object store — not arbitrary
          #   untrusted XML. The patched quick-xml >= 0.41.0 is not yet available
          #   through any object_store release (latest 0.14.0 still pins
          #   quick-xml ^0.40.1), so this is deferred until object_store ships a
          #   0.41-compatible line. https://rustsec.org/advisories/RUSTSEC-2026-0194
          # RUSTSEC-2026-0173: `proc-macro-error2` unmaintained. Pulled only via
          #   jiff's OPTIONAL `defmt` feature, which we do not enable — it is in
          #   Cargo.lock but never compiled into the worker.
          ignore: RUSTSEC-2025-0141,RUSTSEC-2026-0194,RUSTSEC-2026-0195,RUSTSEC-2026-0173

  msrv:
    name: MSRV check (rust 1.90)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned MSRV)
        uses: dtolnay/rust-toolchain@1.90

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo check (workspace, all features)
        run: cargo check --workspace --all-features
