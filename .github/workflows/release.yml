# Copyright 2026 Query Farm LLC - https://query.farm
#
# Build the `bgp-worker` binary for every supported platform and attach the
# archives (+ SHA256 + keyless cosign signature + SLSA provenance) to the GitHub
# Release for a vX.Y.Z tag. The heavy lifting lives in the shared reusable
# workflow Query-farm/vgi-actions/.github/workflows/rust-release.yml; this file
# gates on the repo's own CI suite and supplies the worker-specific inputs.
#
# Assets are named vgi-bgp-<tag>-<duckdb_platform>.tar.gz (linux_amd64,
# linux_arm64, osx_amd64, osx_arm64, windows_amd64). The executable inside each
# archive is `bgp-worker`, used directly as a DuckDB vgi LOCATION:
#   ATTACH 'bgp' (TYPE vgi, LOCATION '/path/to/bgp-worker');
#
# Release flow:
#   1. Bump [workspace.package] version in Cargo.toml; sync Cargo.lock.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
name: Release binaries

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Gate the release on the same unit + SQLLogic e2e suite as push/PR.
  #
  # A called reusable workflow may not request MORE permission than its caller
  # job grants. ci.yml's `audit` job needs `checks: write` (rustsec/audit-check
  # posts a check-run), so this caller job must grant it too — otherwise the read
  # only default caps the nested request and the whole run fails to start
  # (startup_failure). `contents: read` covers the checkout in ci.yml's jobs.
  ci:
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci.yml

  release:
    needs: [ci]
    permissions:
      contents: write     # create Release + upload assets
      id-token: write     # keyless cosign sign-blob + provenance (sigstore OIDC)
      attestations: write # SLSA build-provenance attestation
    uses: Query-farm/vgi-actions/.github/workflows/rust-release.yml@v1
    secrets: inherit
    with:
      bin: bgp-worker
      asset_prefix: vgi-bgp
      version_check_cmd: ci/check-version.sh
